spring.application.name=korp

#==== Configuracao do banco de dados H2 ====
# URL do banco de dados (H2)
spring.datasource.url=jdbc:h2:mem:produtodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#spring.datasource.url=jdbc:mysql://localhost:3306/nome_db
#spring.datasource.username=user
#spring.datasource.password=password
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Configuracao do console do banco de dados H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#Exibir os comandos sql no console Java - optional
#Em producao nao se aplica esse bloco
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
